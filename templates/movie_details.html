{% extends "base.html" %}
{% block title %}Movie Details{% endblock %}

{% block content %}
<div class="card movie-card">

    <h2>{{ movie.title }}</h2>

    <p><strong>Description:</strong> {{ movie.description }}</p>

    <p><strong>Release Date:</strong> {{ movie.release_date }}</p>

    <p><strong>Rating:</strong> ⭐ {{ movie.rating }}/10</p>

    <div class="button-group">
        <a href="{{ url_for('edit_movie', movie_id=movie.id) }}" class="button primary">Edit</a>

        <a href="{{ url_for('delete_movie', movie_id=movie.id) }}"
           class="button danger"
           onclick="return confirm('Are you sure you want to delete this movie?')">
           Delete
        </a>

        <a href="{{ url_for('movies') }}" class="button secondary">Back</a>
    </div>

</div>
{% endblock %}
