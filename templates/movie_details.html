{% extends 'base.html' %}
{% block content %}

<div class="movie-details">
    <img src="{{ movie.poster or url_for('static', filename='default_poster.jpg') }}"
         class="movie-poster-large">

    <div class="info-box">
        <h2>{{ movie.title }}</h2>
        <p>{{ movie.description }}</p>

        <div class="star-rating">
            {% for _ in range(movie.rating) %} ⭐ {% endfor %}
            {% for _ in range(5 - movie.rating) %} ☆ {% endfor %}
        </div>

        <div class="action-buttons">
            <a href="{{ url_for('add_to_watchlist', movie_id=movie.id) }}" class="btn btn-warning">Add to Watchlist</a>
            <a href="{{ url_for('movies') }}" class="btn btn-secondary">Back</a>
        </div>
    </div>
</div>

{% endblock %}
