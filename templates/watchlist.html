{% extends 'base.html' %}
{% block content %}

<h2 class="page-title">⭐ Watchlist</h2>

<div class="movies-grid">
    {% for movie in movies %}
    <div class="movie-card">

        <img src="{{ movie.poster or url_for('static', filename='default_poster.jpg') }}"
             class="movie-poster">

        <h4>{{ movie.title }}</h4>

        <a href="{{ url_for('movie_details', movie_id=movie.id) }}" 
           class="btn btn-outline-primary mt-2 w-100">
           View Details
        </a>

    </div>
    {% endfor %}
</div>

{% endblock %}
