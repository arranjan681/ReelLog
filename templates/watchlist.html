{% extends "base.html" %}
{% block title %}Watchlist{% endblock %}

{% block content %}
<h2 class="page-title">Your Watchlist</h2>

{% if watchlist %}
    <div class="movie-grid">
        {% for movie in watchlist %}
            <div class="card movie-card">
                <h3>{{ movie.title }}</h3>

                <p class="small-text">{{ movie.description[:120] }}...</p>

                <div class="button-group">
                    <a href="{{ url_for('movie_details', movie_id=movie.id) }}" 
                       class="button primary">
                       View
                    </a>

                    <a href="{{ url_for('remove_watchlist', movie_id=movie.id) }}"
                       class="button danger">
                       Remove
                    </a>
                </div>
            </div>
        {% endfor %}
    </div>
{% else %}
    <p>Your watchlist is empty.</p>
{% endif %}

{% endblock %}
