<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Movie App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container d-flex justify-content-between">
        <a class="navbar-brand" href="{{ url_for('dashboard') }}">🎬 Movie App</a>

        {% if current_user.is_authenticated %}
        <div>
            <a href="{{ url_for('movies') }}" class="nav-link d-inline">My Movies</a>
            <a href="{{ url_for('add_movie') }}" class="nav-link d-inline">Add Movie</a>
            <a href="{{ url_for('search') }}" class="nav-link d-inline">Search</a>
            <a href="{{ url_for('watchlist') }}" class="nav-link d-inline">Watchlist</a>
            <a href="{{ url_for('recommendations') }}" class="nav-link d-inline">Recommendations</a>
            <a href="{{ url_for('logout') }}" class="nav-link text-danger d-inline">Logout</a>
        </div>
        {% endif %}
    </div>
</nav>

<div class="container py-4">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-info">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
